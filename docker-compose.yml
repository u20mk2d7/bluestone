version: '3.8'

services:
  # 1. TimescaleDB (PostgreSQL)
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: local-timescale
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    networks:
      - app-network

  # 2. Nginx Web Server
  webserver:
    image: nginx:latest
    container_name: local-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Mounts your local config
    networks:
      - app-network
    depends_on:
      - timescale

  # 3. HAProxy Load Balancer
  haproxy:
    image: haproxy:latest
    container_name: local-haproxy
    ports:
      - "8080:8080" # Example port for HAProxy stats or routing
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro # Mounts your local config
    networks:
      - app-network
    depends_on:
      - timescale
      - webserver

# Define a shared private network for all containers
networks:
  app-network:
    driver: bridge

volumes:
  tsdata: